 <!DOCTYPE html>
<html lang="en">
<head>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheriff's  ATS Checker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="glass-nav">
    <div class="logo">SHERIFF's <span> ATS</span></div>
    <div class="nav-links">
        <div class="n-item active" data-tab="page1"><i class="fas fa-rocket"></i> <span>ATS Checker</span></div>
        <div class="n-item" data-tab="page2" id="nav-report"><i class="fas fa-shield-alt"></i> <span>Audit</span></div>
        <div class="n-item" data-tab="page3"><i class="fas fa-sync"></i> <span>ATS + Job Match</span></div>
    </div>
</nav>

<div class="container">
    <div id="page1" class="page active">
        <div class="hero">
            <div class="student-badge">100% Free for Students</div>
            <h1>Upload Your Resume</h1>
            <p> ATS Friendly Resume Checker for Students</p>
        </div>
        <div class="upload-flex">
            <div class="drop-zone" id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3 id="fn1">Upload Resume</h3>
                <p> PDF, DOCX, & TXT</p>
                <input type="file" id="fileInput" hidden>
            </div>
            <div id="previewContainer" class="preview-card">
                <div class="p-status">LIVE PREVIEW</div>
                <canvas id="pdfPreview"></canvas>
                <div id="textPreview"></div>
            </div>
        </div>
        <button class="btn-primary" id="analyzeBtn">Analyze Resume</button>
    </div>

    <div id="page2" class="page">
        <div class="audit-head">
            <div class="score-ring">
                <span id="finalScore">0</span>%
            </div>
            <div class="audit-info">
                <h2>ATS Score</h2>
                <p></p>
            </div>
        </div>
        
        <div class="metrics-grid">
            <div class="m-box core-clr">
                <h4><i class="fas fa-user-check"></i> Profile Essentials</h4>
                <div id="coreGrid"></div>
            </div>
            <div class="m-box struct-clr">
                <h4><i class="fas fa-layer-group"></i> Structural Logic</h4>
                <div id="structGrid"></div>
            </div>
            <div class="m-box qual-clr">
                <h4><i class="fas fa-star-half-alt"></i> Content Integrity</h4>
                <div id="qualGrid"></div>
            </div>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="jd-sync-wrap">
            <div class="jd-left">
                <div class="jd-upload-bar" onclick="document.getElementById('jdResume').click()">
                    <i class="fas fa-file-import"></i> <span id="fn2">Upload Resume</span>
                    <input type="file" id="jdResume" hidden>
                </div>
                
                <div class="jd-editor-shell">
                    <div class="editor-label">Paste Job Description</div>
                    <textarea id="jdArea" placeholder="// Paste job description here  ..."></textarea>
                </div>
                <button class="btn-primary" id="matchBtn">Analyze</button>
            </div>
            <div id="matchResult" class="jd-right-card hidden">
                </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
