<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheriff's Weather Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>


<div id="loginPage">
    <h2>Login to Weather Dashboard</h2>
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <p id="loginError"></p>
</div>


<div id="dashboard" style="display:none;">
    <div class="app">
        <div class="header">
            <h1>Sheriff's Weather Pro</h1>
            <div id="clock"></div>
        </div>

        <div class="search-area">
            <input type="text" id="cityInput" placeholder="Search city...">
            <button onclick="getWeather()">Search</button>
            <button onclick="getLocationWeather()"> My Location</button>
        </div>

        <div id="error"></div>

        <div class="main-weather">
            <h2 id="cityName"></h2>
            <img id="weatherIcon">
            <h1 id="temp"></h1>
            <p id="condition"></p>
        </div>

        <div class="details">
            <div class="card">
                <h3>Humidity</h3>
                <p id="humidity"></p>
            </div>
            <div class="card">
                <h3>Wind</h3>
                <p id="wind"></p>
            </div>
            <div class="card">
                <h3>UV Index</h3>
                <p id="uv"></p>
            </div>
            <div class="card">
                <h3>AQI</h3>
                <p id="aqi"></p>
            </div>
        </div>

        <h3>7 Day Forecast</h3>
        <div class="forecast" id="forecast"></div>

        <h3>All Users Logged In</h3>
        <div id="userList"></div>

        <div class="logout-btn-container">
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
